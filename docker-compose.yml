services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-axon}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required — copy .env.example to .env and fill it in}
      POSTGRES_DB: ${DB_NAME:-axon_prod}
    volumes:
      - axon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-axon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off migration runner: `docker compose run --rm migrate` before first `docker compose up axon`.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment: &axon_env
      AXON_SERVER_NAME: ${AXON_SERVER_NAME:-localhost}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-axon}
      DB_PASS: ${DB_PASS:?DB_PASS is required — copy .env.example to .env and fill it in}
      DB_NAME: ${DB_NAME:-axon_prod}
      POOL_SIZE: ${POOL_SIZE:-20}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required — copy .env.example to .env and fill it in}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["/axon/bin/axon", "eval", "AxonCore.Release.migrate()"]
    profiles: ["tools"]

  axon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment: *axon_env
    ports:
      - "8008:8008"
      - "8448:8448"

volumes:
  axon_postgres_data:
